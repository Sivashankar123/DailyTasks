<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Personal Profile Card</title>

    <!-- Linking External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Profile Card Container -->
    <div class="profile-card">

        <!-- Name -->
        <h1 class="name">Siva</h1>

        <!-- Role -->
        <h3 class="role">FullStack Developer</h3>

        <!-- Short Bio -->
        <p class="bio">
            Enthusiatic web developer who enjoys building clean and user-friendly
            websites. Skilled in HTML, CSS and JavaScript with a focus on
            responsive design and good user experience.
        </p>

        <!-- Contact Button -->
        <button class="contact-btn">
            Contact Me
        </button>

    </div>

</body>
</html>
